version: "3.9"

services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: televault
      POSTGRES_USER: televault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U televault"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://televault:${POSTGRES_PASSWORD}@db:5432/televault
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - /tmp/televault:/tmp/televault
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    restart: unless-stopped
    command: python -m arq app.tasks.worker.WorkerSettings
    depends_on:
      - db
      - redis
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://televault:${POSTGRES_PASSWORD}@db:5432/televault
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/letsencrypt:ro

volumes:
  pg_data:
  redis_data:
  certs:
